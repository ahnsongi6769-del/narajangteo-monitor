# 검색 키워드 (공고명에 포함되면 매칭, 대소문자 무시, OR 조건)
keywords:
  - LMS
  - 홈페이지
  - 사이트
  - 포털
  - 웹
  - 시스템
  - 플랫폼
  - 구축
  - 개발
  - RISE
  - AI

# 계약방식 제외 키워드 (포함되면 제외)
exclude_contract_keywords:
  - 수의
  - 지명

# 허용 지역명 (공고의 지역제한 텍스트에 포함되어야 함)
allowed_region_names:
  - 대전
  - 세종
  - 충북
  - 충청북도
  - 충남
  - 충청남도

# 지역제한 없는 공고도 포함할지 (true = 전국 가능 공고 알림)
allow_no_region_restriction: true

# 참가 가능 업종코드 (반드시 포함되어야 함, 엄격 필터)
required_industry_codes:  
 - "1468"

# API 검색 윈도우 (분)
search_window_minutes: 35
