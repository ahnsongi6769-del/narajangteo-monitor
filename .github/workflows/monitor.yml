name: 나라장터 모니터

on:
  schedule:
    # 15분 간격이지만 정각/30분(:00/:30) 부하 피크 회피.
    # GitHub Actions cron은 부하시 지연/드롭되며 catch-up이 없으므로
    # 정각 회피 + 다중 fire 기회로 누락률을 낮춤.
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: narajangteo-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          NARA_API_KEY: ${{ secrets.NARA_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python -m src.monitor

      - name: Commit updated seen.json
        # seen.json은 .gitignore에 있으므로 -f로 강제 추가
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f seen.json
          if git diff --cached --quiet; then
            echo "seen.json 변경 없음 — 커밋 건너뜀"
          else
            git commit -m "chore: update seen.json [skip ci]"
            git push
          fi
